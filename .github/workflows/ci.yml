name: Build CI image
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/ci.yml'
      - '.github/workflows/ci/Dockerfile'
      - '.github/workflows/ci/rustup.sh'

env:
  REGISTRY: ghcr.io
  NAME: easytier-ci

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get tag
        id: tag
        run: |
          TAG="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.NAME }}:latest"
          echo "value=${TAG,,}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image with GHA cache
        uses: docker/build-push-action@v6
        with:
          context: .github/workflows/ci
          file: .github/workflows/ci/Dockerfile
          push: true
          tags: ${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
